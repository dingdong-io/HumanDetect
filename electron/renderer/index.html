<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>访客</title>
    <style>
      :root {
        --ql-bg: #f5f5f5;
        --ql-bg-elev: #ffffff;
        --ql-bg-sidebar: #f2f2f2;
        --ql-border: #c9d0d9;
        --ql-text: #333333;
        --ql-muted: #6d705b;
        --ql-accent: #705697;
        --ql-focus: #9769dc;
        --ql-ok: #448c27;
        --ql-bad: #aa3731;
        --ql-log-bg: #f2f8fc;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: var(--ql-bg);
        color: var(--ql-text);
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 20px;
      }
      .card {
        background: var(--ql-bg-elev);
        border: 1px solid var(--ql-border);
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 14px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      .title-row {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
        gap: 8px 14px;
        margin: 0 0 12px;
      }
      .title {
        font-size: 18px;
        font-weight: 700;
        margin: 0;
        color: var(--ql-text);
      }
      .title-hint {
        font-size: 12px;
        font-weight: 400;
        color: var(--ql-muted);
        line-height: 1.4;
        flex: 1 1 220px;
        min-width: 0;
      }
      button,
      select {
        border-radius: 8px;
        border: 1px solid var(--ql-border);
        padding: 8px 12px;
        background: var(--ql-bg-sidebar);
        color: var(--ql-text);
      }
      button:focus-visible,
      select:focus-visible {
        outline: 2px solid var(--ql-focus);
        outline-offset: 1px;
      }
      button {
        cursor: pointer;
      }
      button.primary {
        background: var(--ql-accent);
        border-color: var(--ql-accent);
        color: #ffffff;
      }
      button.warn {
        background: var(--ql-bad);
        border-color: var(--ql-bad);
        color: #ffffff;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .alert {
        font-size: 16px;
        font-weight: 700;
        color: #660000;
        background: #ffeaea;
        border: 1px solid #f1897f;
        border-radius: 8px;
        padding: 10px;
        display: none;
      }
      .alert.show {
        display: block;
        cursor: pointer;
        transition:
          background 0.15s ease,
          box-shadow 0.15s ease,
          transform 0.12s ease;
      }
      .alert.show:hover {
        background: #ffd4d4;
        box-shadow: 0 2px 10px rgba(170, 55, 49, 0.18);
      }
      .alert.show:active {
        transform: scale(0.99);
      }
      .logs {
        background: var(--ql-log-bg);
        border: 1px solid var(--ql-border);
        border-radius: 8px;
        padding: 10px;
        height: 240px;
        overflow: auto;
        white-space: pre-wrap;
        font-family: Consolas, Menlo, Monaco, monospace;
        font-size: 12px;
        line-height: 1.4;
        color: var(--ql-text);
      }
      .kv {
        color: var(--ql-muted);
      }
      .ok {
        color: var(--ql-ok);
      }
      .bad {
        color: var(--ql-bad);
      }
      #windowSelect {
        flex: 0 0 312px;
        min-width: 200px;
        max-width: 100%;
      }
      .strip {
        font-size: 13px;
        gap: 14px;
      }
      .strip > span {
        white-space: nowrap;
      }
      #statusStrip {
        display: none;
      }
      #statusStrip.visible {
        display: flex;
      }
      .info-tip {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .info-tip-icon {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 1px solid var(--ql-border);
        background: var(--ql-bg-sidebar);
        color: var(--ql-muted);
        font-size: 11px;
        font-weight: 700;
        line-height: 14px;
        text-align: center;
        cursor: help;
        user-select: none;
      }
      .info-tip-pop {
        display: none;
        position: absolute;
        left: 50%;
        top: calc(100% + 8px);
        transform: translateX(-50%);
        padding: 10px 12px;
        min-width: 260px;
        max-width: min(380px, 92vw);
        background: var(--ql-bg-elev);
        border: 1px solid var(--ql-border);
        border-radius: 8px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
        font-size: 12px;
        line-height: 1.55;
        font-weight: 400;
        color: var(--ql-text);
        z-index: 50;
        white-space: normal;
        text-align: left;
      }
      .tip-title {
        display: block;
        font-weight: 600;
        font-size: 12px;
        margin-bottom: 6px;
      }
      .tip-list {
        margin: 0;
        padding-left: 1.15em;
      }
      .tip-list li {
        margin: 5px 0;
      }
      .info-tip:hover .info-tip-pop,
      .info-tip:focus .info-tip-pop,
      .info-tip:focus-within .info-tip-pop {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="title-row">
          <h1 class="title">访客</h1>
          <span id="titleHint" class="title-hint"></span>
        </div>
        <div class="row">
          <select id="windowSelect">
            <option value="">请选择窗口</option>
          </select>
          <button id="refreshBtn">刷新窗口列表</button>
          <button id="monitorToggleBtn" type="button" class="primary">开始监听</button>
        </div>
        <div class="row" style="margin-top: 10px; align-items: center">
          <button id="settingsBtn">设置</button>
          <button id="helpBtn">帮助</button>
          <button id="clickerToggleBtn" type="button" class="primary">启动连点器</button>
          <span class="info-tip" tabindex="0" aria-label="连点器说明">
            <span class="info-tip-icon" aria-hidden="true">!</span>
            <span class="info-tip-pop" role="tooltip">
              <span class="tip-title">连点器说明</span>
              在屏幕固定位置间歇模拟点击，详细选项见「设置 → 连点器」。常见用途：
              <ul class="tip-list">
                <li>减轻长时间无操作导致的休眠或锁屏（视系统策略而定）。</li>
                <li>若被监控窗口偶发弹窗，可将鼠标移到「关闭」等安全位置，借助点击协助关掉以便继续监控。</li>
                <li>勿放在会误触其它窗口或引发危险操作的位置；使用前确认焦点与目标安全。</li>
              </ul>
            </span>
          </span>
        </div>
      </div>

      <div class="card">
        <div id="statusStrip" class="row strip" style="margin-bottom: 10px">
          <span><span class="kv">监听窗口</span> <span id="currentWindow">-</span></span>
          <span><span class="kv">访客数</span> <span id="visitorCount">-</span></span>
          <span><span class="kv">可信度</span> <span id="currentConf">-</span></span>
        </div>
        <div class="row" style="margin-bottom: 10px">
          <span class="kv">状态</span> <span id="statusText" class="ok">待命</span>
        </div>
        <div class="row" style="margin-bottom: 10px">
          <button id="clearLogsBtn">清空日志</button>
          <button id="viewHistoryBtn">查看历史</button>
          <button id="openDataBtn">历史图片</button>
        </div>
        <div id="alertBox" class="alert"></div>
        <div id="logs" class="logs"></div>
      </div>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
